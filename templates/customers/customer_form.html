{# templates/customers/customer_form.html #}
{% extends 'base.html' %}

{% block title %}{{ title }} - GOPOS CRM{% endblock %}

{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">儲存</button>
                <a href="{% url 'customer_list' %}" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
